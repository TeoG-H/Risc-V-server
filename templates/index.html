<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>RISC-V CPU Runner</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #2d7df6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e63c9;
    }

    .panel {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    pre {
      background: #f4f4f4;
      padding: 12px;
      overflow: auto;
    }

    .err {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>RISC-V Verilog CPU Runner</h1>

    <div class="panel">
      <form method="post">

        <p><b>Assembly program</b></p>

        <textarea name="code" rows="12" placeholder="Example:

addi t0, zero, 5
addi t1, zero, 7
add  t2, t0, t1
">{{ request.form.get('code','') }}</textarea>

        <br><br>

        <button type="submit">Run program</button>

      </form>
    </div>


    {% if error %}
    <div class="panel">
      <p class="err">Error: {{ error }}</p>
    </div>
    {% endif %}


    <div class="panel">
      <h3>Generated program.mem</h3>
      <pre>{{ memhex }}</pre>
    </div>


    <div class="panel">
      <h3>Simulator output</h3>
      <pre>{{ output }}</pre>
    </div>

  </div>

</body>

</html>
